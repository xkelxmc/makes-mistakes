name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run check

      - name: Tag must match manifest version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          manifest=$(bun -e 'console.log(require("./manifest.json").version)')
          if [ "$TAG" != "v$manifest" ]; then
            echo "Tag $TAG does not match manifest version $manifest" >&2
            exit 1
          fi

      - run: bun run build

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "dist/makes-mistakes-${TAG#v}.zip"

      # Skipped until the Chrome Web Store secrets are configured, so tagging works
      # before the listing exists. Upload and publish share one step to keep the
      # short-lived access token out of step outputs (it would not be masked).
      - name: Publish to the Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${EXTENSION_ID:-}" ]; then
            echo "::notice::CWS secrets not set — skipping store upload."
            exit 0
          fi

          token=$(curl -sf -X POST https://oauth2.googleapis.com/token \
            -d "client_id=$CLIENT_ID" \
            -d "client_secret=$CLIENT_SECRET" \
            -d "refresh_token=$REFRESH_TOKEN" \
            -d "grant_type=refresh_token" | jq -r .access_token)

          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Could not exchange the refresh token — is the OAuth consent screen in production?" >&2
            exit 1
          fi

          echo "::add-mask::$token"

          upload=$(curl -sf -X PUT \
            -H "Authorization: Bearer $token" \
            -H "x-goog-api-version: 2" \
            -T "dist/makes-mistakes-${TAG#v}.zip" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXTENSION_ID")
          echo "$upload" | jq .

          state=$(echo "$upload" | jq -r '.uploadState // "UNKNOWN"')
          if [ "$state" = "FAILURE" ]; then
            echo "Upload rejected by the store." >&2
            exit 1
          fi

          curl -sf -X POST \
            -H "Authorization: Bearer $token" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID/publish" | jq .
